<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ULMIPOINT Bereich</title>
<style>
:root{--text:#172033;--muted:#667085;--line:#d9e2ef;--blue:#2563eb;--green:#0f8a5f;--red:#c73636;--yellow:#9a6700;--shadow:0 12px 30px rgba(16,24,40,.08)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#edf5ff,#fbfcff 55%,#f6f8fc);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);padding:14px}
.hero,.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow)}.card{margin-top:12px}
.eyebrow{font-size:12px;font-weight:950;color:var(--blue);letter-spacing:.06em;text-transform:uppercase}h1{margin:4px 0;font-size:clamp(34px,6vw,62px);line-height:.94;letter-spacing:-.07em}h2{margin:0 0 10px;font-size:22px;letter-spacing:-.04em}.mini{font-size:12px;color:var(--muted);font-weight:850}
.toolbar,.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}input{width:100%;border:1px solid var(--line);border-radius:13px;background:#fff;padding:9px;font-weight:850;color:var(--text)}
button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:950;cursor:pointer;color:var(--text)}button.primary{background:var(--blue);border-color:var(--blue);color:#fff}button.ok{background:#e7f7ef;border-color:#b7e4ca;color:var(--green)}button.bad{background:#ffe7e7;border-color:#f2a3a3;color:#c73636}
.notice{border:1px solid #c9dcff;background:#f7fbff;color:#175cd3;border-radius:16px;padding:10px;font-size:12px;font-weight:850;white-space:pre-wrap}.notice.ok{border-color:#b7e4ca;background:#e7f7ef;color:#0f8a5f}.notice.warn{border-color:#f3d28f;background:#fffdf5;color:#9a6700}
.table{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table{border-collapse:collapse;width:100%;min-width:620px}th,td{text-align:left;border-bottom:1px solid #edf1f6;padding:9px 10px;font-size:12px}th{background:#f8fafc;font-size:11px;color:#475467;text-transform:uppercase;letter-spacing:.04em}td{font-weight:850}.pill{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:950;background:#eef2f7;color:#475467}.pill.green{background:#e7f7ef;color:#0f8a5f}
@media(max-width:700px){body{padding:10px}.hero{border-radius:0 0 24px 24px;margin:-10px -10px 10px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<section class="hero">
  <div class="eyebrow" id="siteName">ULMIPOINT</div>
  <h1 id="unitName">Bereich</h1>
  <div class="toolbar" style="margin-top:10px">
    <span class="pill green">neue Bereichs-Seite</span>
    <span class="pill" id="unitType">Bereich</span>
    <button class="ok" id="saveBtn">Speichern</button>
  </div>
</section>

<section class="card">
  <h2>Mitarbeitende</h2>
  <div class="grid">
    <label><span class="mini">Name</span><input id="empName" placeholder="Name"></label>
    <label><span class="mini">Funktion</span><input id="empRole" placeholder="Funktion"></label>
    <label><span class="mini">Pensum %</span><input id="empPct" type="number" min="0" max="100" step="5" value="100"></label>
  </div>
  <div class="actions" style="margin-top:10px"><button class="primary" id="addEmpBtn">Mitarbeiter hinzufügen</button></div>
  <div class="table" style="margin-top:10px"><table><thead><tr><th>Name</th><th>Funktion</th><th>Pensum</th><th></th></tr></thead><tbody id="empRows"></tbody></table></div>
</section>

<section class="card">
  <h2>Dienste</h2>
  <div class="grid">
    <label><span class="mini">Code</span><input id="dutyCode" placeholder="z. B. F1"></label>
    <label><span class="mini">Name</span><input id="dutyName" placeholder="Frühdienst"></label>
    <label><span class="mini">Start</span><input id="dutyStart" type="time"></label>
    <label><span class="mini">Ende</span><input id="dutyEnd" type="time"></label>
  </div>
  <div class="actions" style="margin-top:10px"><button class="primary" id="addDutyBtn">Dienst hinzufügen</button></div>
  <div class="table" style="margin-top:10px"><table><thead><tr><th>Code</th><th>Name</th><th>Zeit</th><th></th></tr></thead><tbody id="dutyRows"></tbody></table></div>
</section>

<section class="card">
  <h2>Monatsplan</h2>
  <div class="notice warn">Der Monatsplan wird danach auf dieser neuen Bereichs-Seite aufgebaut.</div>
  <div id="status" class="notice" style="margin-top:10px">Bereit.</div>
</section>

<script>
(function(){
  const p=new URLSearchParams(location.search);
  function param(n,f=''){return p.get(n)||f}
  function slug(v){return String(v||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'bereich'}
  const ctx={siteId:param('siteId','haus'),siteName:param('siteName','Haus'),unitId:param('unitId','bereich'),unitName:param('unitName','Bereich'),unitType:param('unitType','bereich'),plannerKey:param('plannerKey',param('unitId','bereich'))}
  const STORE_KEY='ulmipoint_bereich_'+slug(ctx.siteId)+'__'+slug(ctx.plannerKey)+'_v1';
  let state={employees:[],duties:[],updatedAt:''};
  const $=id=>document.getElementById(id);
  const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  function status(t,k=''){const el=$('status');el.textContent=t;el.className='notice'+(k?' '+k:'')}
  function load(){try{const s=JSON.parse(localStorage.getItem(STORE_KEY)||'null');if(s)state=Object.assign(state,s)}catch(_){};$('unitName').textContent=ctx.unitName;$('siteName').textContent=ctx.siteName;$('unitType').textContent=ctx.unitType;document.title='ULMIPOINT · '+ctx.unitName;render();}
  function save(){state.updatedAt=new Date().toISOString();localStorage.setItem(STORE_KEY,JSON.stringify(state));status('Gespeichert: '+new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}),'ok')}
  function render(){
    $('empRows').innerHTML=state.employees.map((e,i)=>'<tr><td>'+esc(e.name)+'</td><td>'+esc(e.role)+'</td><td>'+esc(e.pct)+'%</td><td><button class="bad" data-del-emp="'+i+'">löschen</button></td></tr>').join('') || '<tr><td colspan="4" class="mini">Noch keine Mitarbeitenden.</td></tr>';
    $('dutyRows').innerHTML=state.duties.map((d,i)=>'<tr><td>'+esc(d.code)+'</td><td>'+esc(d.name)+'</td><td>'+esc(d.start)+'–'+esc(d.end)+'</td><td><button class="bad" data-del-duty="'+i+'">löschen</button></td></tr>').join('') || '<tr><td colspan="4" class="mini">Noch keine Dienste.</td></tr>';
    document.querySelectorAll('[data-del-emp]').forEach(b=>b.onclick=()=>{state.employees.splice(Number(b.dataset.delEmp),1);save();render()});
    document.querySelectorAll('[data-del-duty]').forEach(b=>b.onclick=()=>{state.duties.splice(Number(b.dataset.delDuty),1);save();render()});
  }
  function addEmp(){const name=$('empName').value.trim();if(!name){status('Name fehlt.','warn');return}state.employees.push({id:'emp_'+Date.now(),name,role:$('empRole').value.trim(),pct:Number($('empPct').value)||100});$('empName').value='';$('empRole').value='';$('empPct').value='100';save();render()}
  function addDuty(){const code=$('dutyCode').value.trim().toUpperCase();if(!code){status('Code fehlt.','warn');return}state.duties.push({code,name:$('dutyName').value.trim(),start:$('dutyStart').value,end:$('dutyEnd').value});$('dutyCode').value='';$('dutyName').value='';$('dutyStart').value='';$('dutyEnd').value='';save();render()}
  $('saveBtn').onclick=save;$('addEmpBtn').onclick=addEmp;$('addDutyBtn').onclick=addDuty;load();
})();
</script>
</body>
</html>
