plugins { id 'com.android.application' }

def keystorePath = System.getenv("ANDROID_KEYSTORE_PATH")
def storePass = System.getenv("ANDROID_KEYSTORE_PASSWORD")
def aliasName = System.getenv("ANDROID_KEY_ALIAS")
def keyPass = System.getenv("ANDROID_KEY_PASSWORD")
def canSign = keystorePath && storePass && aliasName && keyPass && file(keystorePath).exists()

android {
    namespace 'ch.ulmipoint.wunschportal'
    compileSdk 35
    defaultConfig {
        applicationId 'ch.ulmipoint.wunschportal'
        minSdk 23
        targetSdk 35
        versionCode 4
        versionName '1.3-qr-kamera'
    }
    signingConfigs {
        release {
            if (canSign) {
                storeFile file(keystorePath)
                storePassword storePass
                keyAlias aliasName
                keyPassword keyPass
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            if (canSign) signingConfig signingConfigs.release
        }
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-code-scanner:16.1.0'
}
