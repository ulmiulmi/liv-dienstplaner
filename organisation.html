<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ULMIPOINT Organisation</title>
<style>
:root{--bg:#f6f8fc;--card:#fff;--text:#172033;--muted:#667085;--line:#d9e2ef;--blue:#2563eb;--green:#0f8a5f;--red:#c73636;--yellow:#9a6700;--shadow:0 12px 30px rgba(16,24,40,.08)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#edf5ff,#fbfcff 55%,#f6f8fc);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}
.app{max-width:1280px;margin:0 auto;padding:14px}.hero,.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow)}.card{margin-top:12px}
.hero{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}.eyebrow{font-size:12px;font-weight:950;color:var(--blue);letter-spacing:.06em;text-transform:uppercase}
h1{margin:3px 0 2px;font-size:clamp(30px,4vw,48px);line-height:.96;letter-spacing:-.06em}h2{margin:0 0 8px;font-size:20px;letter-spacing:-.03em}.mini{font-size:12px;color:var(--muted);font-weight:850;line-height:1.35}
.toolbar,.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row{display:grid;grid-template-columns:1.2fr .7fr .7fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:10px;background:#fbfcfe;margin-top:8px}
.unit{display:grid;grid-template-columns:1.2fr .7fr .7fr auto;gap:8px;align-items:center;border:1px solid #edf1f6;border-radius:14px;padding:8px;background:#fff;margin-top:6px}
input,select{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:9px;font-weight:850;color:var(--text)}
button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:950;cursor:pointer;color:var(--text)}
button.primary{background:var(--blue);border-color:var(--blue);color:#fff}button.ok{background:#e7f7ef;border-color:#b7e4ca;color:var(--green)}button.bad{background:#ffe7e7;border-color:#f2a3a3;color:#c73636}.notice{border:1px solid #c9dcff;background:#f7fbff;color:#175cd3;border-radius:14px;padding:10px;font-size:12px;font-weight:850;white-space:pre-wrap}.notice.bad{border-color:#f2a3a3;background:#fffafa;color:#c73636}.notice.ok{border-color:#b7e4ca;background:#e7f7ef;color:#0f8a5f}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:950;background:#eef2f7;color:#475467}
@media(max-width:820px){.app{padding:10px}.grid,.row,.unit{grid-template-columns:1fr}.hero{border-radius:0 0 24px 24px;margin:-10px -10px 10px}}
</style>
</head>
<body>
<div class="app">
<section class="hero">
  <div>
    <div class="eyebrow">ULMIPOINT</div>
    <h1>Organisation</h1>
  </div>
  <div class="toolbar">
    <button class="primary" id="loadBtn">Laden</button>
    <button class="ok" id="saveBtn">Speichern</button>
    <button id="addSiteBtn">Standort hinzufügen</button>
  </div>
</section>

<section class="card">
  <h2>Grunddaten</h2>
  <div class="grid">
    <label><span class="mini">Organisation</span><input id="orgName" value="LIV – Leben in Vielfalt"></label>
    <label><span class="mini">Standard-Regelwerk</span><input id="payrollProfile" value="CH_BS_PERSONALRECHT_DEFAULT"></label>
  </div>
  <div id="status" class="notice" style="margin-top:10px">Noch nicht geladen.</div>
</section>

<section class="card">
  <div class="toolbar" style="justify-content:space-between">
    <h2>Standorte / Wohnheime / Tageszentren</h2>
    <span class="pill" id="countPill">0 Standorte</span>
  </div>
  <div id="sites"></div>
</section>
</div>

<script>
(function(){
  const SERVER_TOKEN_KEY='polypoint_server_session_v1';
  let org={organisation:{id:'liv',name:'LIV – Leben in Vielfalt'},payrollProfileDefault:'CH_BS_PERSONALRECHT_DEFAULT',sites:[]};
  const $=id=>document.getElementById(id);
  const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const slug=s=>String(s||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'default';
  function status(t,k=''){const el=$('status');el.textContent=t;el.className='notice'+(k?' '+k:'')}
  function session(){try{const s=JSON.parse(localStorage.getItem(SERVER_TOKEN_KEY)||'{}'); if(s&&s.access_token)return s;}catch(_){} return null}
  function requireSession(){const s=session(); if(!s||!s.access_token)throw new Error('Bitte im Hauptplaner über ☁️ Server einloggen.'); if(s.expires_at&&s.expires_at<Date.now()+30000)throw new Error('Server-Sitzung ist abgelaufen. Bitte neu einloggen.'); return s}
  async function api(body){
    const s=requireSession();
    const resp=await fetch('/api/org-structure',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.access_token},body:JSON.stringify(body)});
    const txt=await resp.text(); let data={}; try{data=txt?JSON.parse(txt):{};}catch(_){data={message:txt};}
    if(!resp.ok||data.ok===false)throw new Error(data.message||('HTTP '+resp.status));
    return data;
  }
  function defaultSite(){
    return {id:'standort_'+(org.sites.length+1),name:'Neuer Standort',type:'wohnheim',canton:'BS',active:true,units:[]};
  }
  function defaultUnit(site){
    return {id:'bereich_'+((site.units||[]).length+1),name:'Neuer Bereich',type:'wohngruppe',plannerKey:'',active:true};
  }
  function render(){
    $('orgName').value=org.organisation?.name||'LIV – Leben in Vielfalt';
    $('payrollProfile').value=org.payrollProfileDefault||'CH_BS_PERSONALRECHT_DEFAULT';
    $('countPill').textContent=(org.sites||[]).length+' Standorte';
    $('sites').innerHTML=(org.sites||[]).map((site,si)=>`
      <div class="row">
        <label><span class="mini">Standort</span><input data-site="${si}" data-field="name" value="${esc(site.name)}"></label>
        <label><span class="mini">Typ</span><select data-site="${si}" data-field="type">
          ${['wohnheim','tageszentrum','verwaltung','zentrale_dienste','sonstiges'].map(t=>`<option value="${t}" ${site.type===t?'selected':''}>${t}</option>`).join('')}
        </select></label>
        <label><span class="mini">Kanton</span><input data-site="${si}" data-field="canton" value="${esc(site.canton||'BS')}"></label>
        <div class="actions">
          <button type="button" onclick="window.__orgAddUnit(${si})">Bereich +</button>
          <button type="button" class="bad" onclick="window.__orgRemoveSite(${si})">löschen</button>
        </div>
        <div style="grid-column:1/-1">
          ${(site.units||[]).map((u,ui)=>`
            <div class="unit">
              <label><span class="mini">Bereich/Gruppe</span><input data-site="${si}" data-unit="${ui}" data-field="name" value="${esc(u.name)}"></label>
              <label><span class="mini">Typ</span><select data-site="${si}" data-unit="${ui}" data-field="type">
                ${['wohngruppe','tageszentrum','nachtwache','pikett','hausdienstplan','team','sonstiges'].map(t=>`<option value="${t}" ${u.type===t?'selected':''}>${t}</option>`).join('')}
              </select></label>
              <label><span class="mini">Planer-Key</span><input data-site="${si}" data-unit="${ui}" data-field="plannerKey" value="${esc(u.plannerKey||u.id)}"></label>
              <button type="button" class="bad" onclick="window.__orgRemoveUnit(${si},${ui})">löschen</button>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('') || '<div class="notice">Noch kein Standort erfasst.</div>';

    document.querySelectorAll('[data-site]').forEach(el=>{
      el.onchange=()=>syncFromInputs();
      el.oninput=()=>syncFromInputs();
    });
  }
  function syncFromInputs(){
    org.organisation=org.organisation||{};
    org.organisation.name=$('orgName').value.trim()||'LIV – Leben in Vielfalt';
    org.organisation.id=slug(org.organisation.name);
    org.payrollProfileDefault=$('payrollProfile').value.trim()||'CH_BS_PERSONALRECHT_DEFAULT';
    document.querySelectorAll('[data-site]:not([data-unit])').forEach(el=>{
      const si=Number(el.dataset.site), f=el.dataset.field;
      if(org.sites[si]){org.sites[si][f]=el.value; if(f==='name')org.sites[si].id=slug(el.value);}
    });
    document.querySelectorAll('[data-unit]').forEach(el=>{
      const si=Number(el.dataset.site), ui=Number(el.dataset.unit), f=el.dataset.field;
      if(org.sites[si]&&org.sites[si].units[ui]){org.sites[si].units[ui][f]=el.value; if(f==='name')org.sites[si].units[ui].id=slug(el.value);}
    });
  }
  window.__orgAddUnit=si=>{syncFromInputs(); const s=org.sites[si]; if(!s)return; s.units=s.units||[]; s.units.push(defaultUnit(s)); render();};
  window.__orgRemoveUnit=(si,ui)=>{syncFromInputs(); if(org.sites[si])org.sites[si].units.splice(ui,1); render();};
  window.__orgRemoveSite=si=>{syncFromInputs(); org.sites.splice(si,1); render();};
  async function load(){
    status('Organisation wird geladen …');
    const data=await api({mode:'load'});
    org=data.organisationStructure||org; render(); status('Organisation geladen.','ok');
  }
  async function save(){
    syncFromInputs();
    status('Organisation wird gespeichert …');
    const data=await api({mode:'save',organisationStructure:org});
    org=data.organisationStructure||org; render(); status('Organisation gespeichert.','ok');
  }
  $('addSiteBtn').onclick=()=>{syncFromInputs(); org.sites=org.sites||[]; org.sites.push(defaultSite()); render();};
  $('loadBtn').onclick=()=>load().catch(e=>status('Fehler: '+e.message,'bad'));
  $('saveBtn').onclick=()=>save().catch(e=>status('Fehler: '+e.message,'bad'));
  $('orgName').oninput=syncFromInputs; $('payrollProfile').oninput=syncFromInputs;
  render();
  load().catch(e=>status('Fehler: '+e.message,'bad'));
})();
</script>
</body>
</html>
