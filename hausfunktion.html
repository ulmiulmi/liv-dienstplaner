<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ULMIPOINT – wird umgeleitet</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#edf5ff,#fbfcff 55%,#f6f8fc);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:#172033;padding:18px}.card{max-width:520px;background:#fff;border:1px solid #d9e2ef;border-radius:26px;padding:18px;box-shadow:0 12px 30px rgba(16,24,40,.08)}.eyebrow{font-size:12px;font-weight:950;color:#2563eb;letter-spacing:.06em;text-transform:uppercase}h1{margin:4px 0 8px;font-size:34px;letter-spacing:-.06em}.mini{font-size:13px;color:#667085;font-weight:850;line-height:1.4}a{display:inline-flex;margin-top:12px;border:1px solid #d9e2ef;border-radius:999px;padding:10px 14px;text-decoration:none;color:#172033;font-weight:950}
</style>
<script>
(function(){
  var target = "overview";
  function safeJson(v){try{return JSON.parse(v||'null')}catch(_){return null}}
  var p = new URLSearchParams(location.search || '');
  var site = p.get('site') || p.get('siteId') || '';
  if(!site){
    var stored = safeJson(localStorage.getItem('ulmipoint_selected_site_v1'));
    if(stored && stored.id) site = stored.id;
  }
  if(!site) site = 'haus_1';
  var url = 'planer.html?site=' + encodeURIComponent(site) + '#' + encodeURIComponent(target);
  location.replace(url);
})();
</script>
</head>
<body>
  <div class="card">
    <div class="eyebrow">ULMIPOINT</div>
    <h1>Einheitliche Planer-Seite</h1>
    <div class="mini">Diese alte Einzeldatei wird nicht mehr separat verwendet. Alles läuft jetzt über den neuen Planer.</div>
    <a id="manualLink" href="planer.html#overview">Planer öffnen</a>
  </div>
<script>
(function(){
  var h = location.hash || '#overview';
  document.getElementById('manualLink').href = 'planer.html' + h;
})();
</script>
</body>
</html>
