<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>POLYPOINT Adapter · V13.0.203 · Split</title>
<style>
  :root { --bg:#f6f8fc; --card:#fff; --text:#172033; --muted:#667085; --line:#d9e2ef; --blue:#2563eb; --green:#0f8a5f; --brown:#7c2d12; --red:#c73636; --shadow:0 12px 30px rgba(16,24,40,.08); }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:linear-gradient(135deg,#edf5ff,#fbfcff 55%,#f6f8fc);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);overflow:hidden}
  .shell{height:100%;display:grid;grid-template-rows:auto 1fr;gap:0}
  .top{background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);box-shadow:0 8px 24px rgba(16,24,40,.07);padding:9px 12px;z-index:20}
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  h1{font-size:20px;line-height:1.1;margin:0;letter-spacing:-.04em}
  .mini{font-size:12px;color:var(--muted);font-weight:850;line-height:1.35}
  .pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:950;background:#eef2f7;color:#475467;white-space:nowrap}
  .pill.blue{background:#eaf2ff;color:var(--blue)} .pill.green{background:#e7f7ef;color:var(--green)} .pill.brown{background:#fff4ed;color:var(--brown)}
  .tabs{display:flex;gap:7px;flex-wrap:nowrap;align-items:center;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
  button{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:8px 12px;font-weight:950;cursor:pointer;white-space:nowrap;flex:0 0 auto}
  button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(16,24,40,.08)}
  button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  button.pikett.active{background:var(--brown);border-color:var(--brown)} button.closed-tab{color:var(--red);background:#fffafa;border-color:#f2a3a3}
  .frame-wrap{position:relative;min-height:0;background:#fff}
  .planner-frame{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff;display:none}
  .planner-frame.active{display:block}
  .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f6f8fc;color:#667085;font-weight:950}
  @media(max-width:740px){.top{padding:7px 8px}.head{margin-bottom:6px;display:block}.head .mini{display:none}h1{font-size:17px}button{padding:7px 10px;font-size:12px}.pill{font-size:11px;padding:4px 8px}.head>div:last-child{margin-top:6px;display:flex;gap:5px;overflow-x:auto}}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="head">
      <div>
        <h1>POLYPOINT Adapter · V13.0.203</h1>
        <div class="mini">Split-Version: jede Gruppe bleibt als eigene HTML-Datei geladen.</div>
      </div>
      <div>
        <span class="pill blue" id="activeLabel">geladen: Startseite</span>
        <span class="pill green">GitHub Pages</span>
        <span class="pill brown">aufgeteilt</span>
      </div>
    </div>
    <nav class="tabs" aria-label="Bereiche">
      <button type="button" data-planner="overview" class="active  " aria-pressed="true">🏠 Startseite</button>
      <button type="button" data-planner="azoren" class="  " aria-pressed="false">Azoren</button>
      <button type="button" data-planner="bali" class="  " aria-pressed="false">Bali</button>
      <button type="button" data-planner="capri" class="  closed-tab" aria-pressed="false">Capri</button>
      <button type="button" data-planner="delos" class="  " aria-pressed="false">Delos</button>
      <button type="button" data-planner="nachtwache" class="  " aria-pressed="false">Nachtwache</button>
      <button type="button" data-planner="pikett" class=" pikett " aria-pressed="false">Haus-Pikett</button>
      <button type="button" data-planner="hausdienstplan" class="  " aria-pressed="false">Haus-Dienstplan</button>
    </nav>
  </header>
  <main class="frame-wrap" id="frameWrap">
    <div class="loader" id="loader">Bereich wird geladen…</div>
  </main>
</div>
<script>
(function(){
  const labels = {"overview": "Startseite", "azoren": "Azoren", "bali": "Bali", "capri": "Capri", "delos": "Delos", "nachtwache": "Nachtwache", "pikett": "Haus-Pikett", "hausdienstplan": "Haus-Dienstplan"};
  const ids = Object.keys(labels);
  const frameWrap = document.getElementById('frameWrap');
  const loader = document.getElementById('loader');
  const activeLabel = document.getElementById('activeLabel');
  const frames = new Map();
  let activeId = null;

  function normalize(id){
    id = String(id || '').replace(/^#/, '').trim().toLowerCase();
    return labels[id] ? id : 'overview';
  }

  function ensureFrame(id){
    if(frames.has(id)) return frames.get(id);
    const iframe = document.createElement('iframe');
    iframe.className = 'planner-frame';
    iframe.dataset.planner = id;
    iframe.title = labels[id];
    iframe.src = id + '.html';
    iframe.addEventListener('load', () => { if(activeId === id) loader.style.display = 'none'; });
    frameWrap.appendChild(iframe);
    frames.set(id, iframe);
    return iframe;
  }

  function setActiveButton(id){
    document.querySelectorAll('[data-planner]').forEach(btn => {
      const on = btn.dataset.planner === id;
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }

  function loadPlanner(id, pushHash=true){
    id = normalize(id);
    activeId = id;
    loader.style.display = 'flex';
    frames.forEach(frame => frame.classList.remove('active'));
    const frame = ensureFrame(id);
    frame.classList.add('active');
    setActiveButton(id);
    activeLabel.textContent = 'geladen: ' + labels[id];
    if(pushHash && location.hash.replace('#','') !== id) history.replaceState(null, '', '#' + id);
    setTimeout(() => { if(activeId === id) loader.style.display = 'none'; }, 900);
  }

  document.querySelectorAll('[data-planner]').forEach(btn => {
    btn.addEventListener('click', () => loadPlanner(btn.dataset.planner));
  });

  window.addEventListener('message', event => {
    const data = event.data || {};
    if(data && data.type === 'loadPlanner') loadPlanner(data.id || data.planner || data.target);
    if(typeof data === 'string' && labels[data]) loadPlanner(data);
  });

  window.addEventListener('hashchange', () => loadPlanner(location.hash, false));
  loadPlanner(location.hash || 'overview', false);
})();
</script>
</body>
</html>
