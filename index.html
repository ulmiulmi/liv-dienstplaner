<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ULMIPOINT Organisation</title>
<style>
:root{--bg:#f6f8fc;--card:#fff;--text:#172033;--muted:#667085;--line:#d9e2ef;--blue:#2563eb;--green:#0f8a5f;--red:#c73636;--yellow:#9a6700;--shadow:0 12px 30px rgba(16,24,40,.08)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#edf5ff,#fbfcff 55%,#f6f8fc);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}
.app{max-width:1320px;margin:0 auto;padding:14px}.hero,.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow)}.card{margin-top:12px}
.hero{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}.eyebrow{font-size:12px;font-weight:950;color:var(--blue);letter-spacing:.06em;text-transform:uppercase}
h1{margin:3px 0 2px;font-size:clamp(38px,6vw,70px);line-height:.92;letter-spacing:-.075em}h2{margin:0 0 10px;font-size:24px;letter-spacing:-.045em}h3{margin:0;font-size:22px;letter-spacing:-.04em}.mini{font-size:12px;color:var(--muted);font-weight:850;line-height:1.35}
.toolbar,.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-weight:950;cursor:pointer;color:var(--text)}button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(16,24,40,.08)}
button.primary{background:var(--blue);border-color:var(--blue);color:#fff}button.ok{background:#e7f7ef;border-color:#b7e4ca;color:var(--green)}button.warn{background:#fff7e6;border-color:#f3d28f;color:#9a6700}
.notice{border:1px solid #c9dcff;background:#f7fbff;color:#175cd3;border-radius:16px;padding:10px;font-size:12px;font-weight:850;white-space:pre-wrap}.notice.bad{border-color:#f2a3a3;background:#fffafa;color:#c73636}.notice.ok{border-color:#b7e4ca;background:#e7f7ef;color:#0f8a5f}.notice.warn{border-color:#f3d28f;background:#fffdf5;color:#9a6700}
.site{background:#fff;border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px;min-height:190px}
.site-head{display:flex;gap:10px;align-items:flex-start}.icon{width:48px;height:48px;border-radius:18px;background:#eaf2ff;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:25px;flex:0 0 auto}
.pill{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:950;background:#eef2f7;color:#475467}.pill.green{background:#e7f7ef;color:#0f8a5f}.pill.yellow{background:#fff7e6;color:#9a6700}.pill.blue{background:#eaf2ff;color:#2563eb}
.units{display:flex;gap:7px;flex-wrap:wrap}.unit-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fbfcfe;border-radius:999px;padding:7px 9px;font-size:12px;font-weight:900}
.empty{border:1px dashed #c9dcff;background:#f7fbff;border-radius:24px;padding:28px;text-align:center;color:#175cd3;font-weight:900}
.logo-word{font-size:18px;font-weight:950;letter-spacing:-.05em}
@media(max-width:760px){.app{padding:10px}.hero{border-radius:0 0 24px 24px;margin:-10px -10px 10px}.grid{grid-template-columns:1fr}h1{font-size:42px}}
</style>
</head>
<body>
<div class="app">
  <section class="hero">
    <div>
      <div class="eyebrow">ULMIPOINT</div>
      <h1>Organisation</h1>
      <div class="logo-word" id="orgTitle">LIV – Leben in Vielfalt</div>
    </div>
    <div class="toolbar">
      <button class="primary" id="reloadBtn">Neu laden</button>
      <button class="ok" id="adminBtn">Organisation verwalten</button>
      <button class="warn" id="plannerBtn">Planer öffnen</button>
      <button id="lastBtn">letztes Haus</button>
    </div>
  </section>

  <section class="card">
    <div class="toolbar" style="justify-content:space-between">
      <h2 style="margin:0">Haus / Bereich öffnen</h2>
      <span class="pill blue" id="countPill">0 Standorte</span>
    </div>
    <div id="status" class="notice" style="margin-top:10px">Organisation wird geladen …</div>
  </section>

  <section style="margin-top:12px">
    <div id="sites" class="grid"></div>
  </section>
</div>

<script>
(function(){
  const SERVER_TOKEN_KEY='polypoint_server_session_v1';
  const SELECTED_KEY='ulmipoint_selected_site_v1';

  const fallbackOrg={
    organisation:{id:'liv',name:'LIV – Leben in Vielfalt'},
    sites:[{
      id:'haus_1',
      name:'Haus 1',
      type:'wohnheim',
      canton:'BS',
      units:[
        {id:'azoren',name:'Azoren',type:'wohngruppe',plannerKey:'azoren'},
        {id:'bali',name:'Bali',type:'wohngruppe',plannerKey:'bali'},
        {id:'capri',name:'Capri',type:'wohngruppe',plannerKey:'capri'},
        {id:'delos',name:'Delos',type:'wohngruppe',plannerKey:'delos'},
        {id:'nachtwache',name:'Nachtwache',type:'nachtwache',plannerKey:'nachtwache'}
      ],
      automaticFunctions:{pikett:true,hausdienstplan:true}
    }]
  };

  let org=fallbackOrg;
  const $=id=>document.getElementById(id);
  const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  function status(t,k=''){const el=$('status');el.textContent=t;el.className='notice'+(k?' '+k:'')}
  function icon(type){return type==='tageszentrum'?'☀️':type==='verwaltung'?'🗂️':type==='zentrale_dienste'?'⚙️':'🏠'}
  function typeLabel(t){return ({wohnheim:'Haus',tageszentrum:'Tageszentrum',verwaltung:'Verwaltung',zentrale_dienste:'Zentrale Dienste',sonstiges:'Standort'})[t]||t}
  function realUnits(site){return (site.units||[]).filter(u=>!['pikett','hausdienstplan'].includes(u.type))}
  function safeParse(v){try{return JSON.parse(v||'null')}catch(_){return null}}
  function session(){return safeParse(localStorage.getItem(SERVER_TOKEN_KEY))}
  function hasSession(){const s=session(); return !!(s&&s.access_token&&(!s.expires_at||s.expires_at>Date.now()+30000))}
  async function api(body){
    const s=session();
    if(!s||!s.access_token) throw new Error('Keine Server-Sitzung. Fallback wird angezeigt.');
    const resp=await fetch('/api/org-structure',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.access_token},body:JSON.stringify(body)});
    const txt=await resp.text(); let data={}; try{data=txt?JSON.parse(txt):{};}catch(_){data={message:txt};}
    if(!resp.ok||data.ok===false)throw new Error(data.message||('HTTP '+resp.status));
    return data;
  }
  function openSite(site){
    localStorage.setItem(SELECTED_KEY,JSON.stringify({
      id:site.id,
      name:site.name,
      type:site.type,
      canton:site.canton||'BS',
      units:realUnits(site),
      selectedAt:new Date().toISOString()
    }));
    location.href='planer.html?site='+encodeURIComponent(site.id);
  }
  function render(message,kind){
    $('orgTitle').textContent=org.organisation?.name||'LIV – Leben in Vielfalt';
    const sites=org.sites||[];
    $('countPill').textContent=sites.length+' Standorte';
    $('sites').innerHTML=sites.map((site,si)=>`
      <article class="site">
        <div class="site-head">
          <div class="icon">${icon(site.type)}</div>
          <div>
            <h3>${esc(site.name)}</h3>
            <div style="margin-top:5px"><span class="pill green">${esc(typeLabel(site.type))}</span> <span class="pill">${esc(site.canton||'BS')}</span> <span class="pill yellow">${realUnits(site).length} Bereiche</span></div>
          </div>
        </div>
        <div class="units">
          ${realUnits(site).map(u=>`<span class="unit-chip">${esc(u.name)} <small>${esc(u.type)}</small></span>`).join('') || '<span class="mini">Noch keine Bereiche</span>'}
          <span class="unit-chip">Haus-Pikett <small>auto</small></span>
          <span class="unit-chip">Haus-Dienstplan <small>auto</small></span>
        </div>
        <div class="actions" style="margin-top:auto">
          <button class="primary" onclick="window.__openSite(${si})">öffnen</button>
          <button onclick="window.open('organisation-admin.html','_blank')">bearbeiten</button>
        </div>
      </article>
    `).join('') || '<div class="empty">Noch keine Häuser oder Tageszentren erstellt.<br><br><button class="primary" onclick="window.open(\\'organisation-admin.html\\',\\'_blank\\')">Organisation verwalten</button></div>';
    window.__openSite=si=>openSite(sites[si]);
    if(message) status(message,kind||'');
  }
  async function load(){
    render('Organisation wird geladen …','');
    try{
      const data=await api({mode:'load'});
      org=data.organisationStructure||fallbackOrg;
      if(!org.sites||!org.sites.length) org=fallbackOrg;
      render('Organisation geladen. Bitte Haus oder Tageszentrum öffnen.','ok');
    }catch(e){
      org=fallbackOrg;
      render('Server-Organisation konnte nicht geladen werden. Haus 1 wird als sichere Standard-Auswahl angezeigt. Der Planer bleibt erreichbar.','warn');
    }
  }
  function openLast(){
    const s=safeParse(localStorage.getItem(SELECTED_KEY));
    if(s&&s.id){location.href='planer.html?site='+encodeURIComponent(s.id);return;}
    openSite((org.sites||fallbackOrg.sites)[0]);
  }
  $('reloadBtn').onclick=load;
  $('adminBtn').onclick=()=>window.open('organisation-admin.html','_blank');
  $('plannerBtn').onclick=()=>location.href='planer.html';
  $('lastBtn').onclick=openLast;
  render('Organisation wird geladen …','');
  load();
})();
</script>
</body>
</html>
