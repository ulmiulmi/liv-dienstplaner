<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ULMIPOINT Haus</title>
<style>
:root{--text:#172033;--muted:#667085;--line:#d9e2ef;--blue:#2563eb;--green:#0f8a5f;--yellow:#9a6700;--brown:#7c2d12;--shadow:0 12px 30px rgba(16,24,40,.08)}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(135deg,#edf5ff,#fbfcff 55%,#f6f8fc);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);padding:14px}
.hero,.house{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow)}
.hero{margin-bottom:12px}.eyebrow{font-size:12px;font-weight:950;color:var(--blue);letter-spacing:.06em;text-transform:uppercase}
h1{margin:3px 0 4px;font-size:clamp(38px,7vw,74px);letter-spacing:-.08em;line-height:.9}.mini{font-size:13px;color:var(--muted);font-weight:850}
.house{position:relative;overflow:hidden;min-height:520px;background:linear-gradient(180deg,#dff3ff 0 30%,#fff 30% 100%)}
.roof{position:absolute;left:8%;right:8%;top:26px;height:120px;background:linear-gradient(135deg,#4b5563,#111827);clip-path:polygon(50% 0,100% 100%,0 100%);opacity:.92}
.facade{position:relative;margin-top:84px;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.9);border-radius:26px;padding:18px;box-shadow:0 18px 40px rgba(16,24,40,.12)}
.top-functions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:-58px 0 14px;position:relative;z-index:2}
.fn{border:1px solid rgba(255,255,255,.35);border-radius:22px;padding:14px 18px;font-weight:950;cursor:pointer;box-shadow:0 12px 28px rgba(16,24,40,.18)}
.fn.night{background:linear-gradient(135deg,#111827,#1e3a8a);color:#fff;min-width:230px}.fn.pikett{background:#fff7e6;color:#9a6700;border-color:#f3d28f}.fn.plan{background:#eaf2ff;color:#2563eb;border-color:#c9dcff}
.rooms{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.room{min-height:150px;border:1px solid rgba(255,255,255,.7);border-radius:24px;padding:16px;text-align:left;box-shadow:0 12px 26px rgba(16,24,40,.12);cursor:pointer;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden}
.room:before{content:"";position:absolute;inset:10px;border:1px solid rgba(255,255,255,.55);border-radius:18px;pointer-events:none}.room strong{font-size:clamp(24px,4vw,38px);letter-spacing:-.06em;line-height:.9;position:relative;z-index:1}.room small{font-size:12px;font-weight:950;opacity:.8;position:relative;z-index:1}.emoji{font-size:34px;position:absolute;right:16px;top:14px}.empty{background:linear-gradient(135deg,#f8fafc,#eef2f7);color:#667085;cursor:default}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-weight:950;text-decoration:none;color:var(--text)}
@media(max-width:700px){body{padding:10px}.house{min-height:auto;border-radius:22px}.rooms{grid-template-columns:1fr}.top-functions{margin:-40px 0 12px}.fn.night{min-width:auto;width:100%}}
</style>
</head>
<body>
<section class="hero">
  <div class="eyebrow" id="siteType">ULMIPOINT</div>
  <h1 id="siteName">Haus</h1>
  <div class="mini">Eigene Startseite für diesen Standort.</div>
</section>

<main class="house">
  <div class="roof"></div>
  <section class="facade">
    <div class="top-functions" id="functionButtons"></div>
    <div class="rooms" id="rooms"></div>
    <div class="actions">
      <a class="btn" href="organisation-admin.html" target="_blank">Organisation bearbeiten</a>
    </div>
  </section>
</main>

<script>
(function(){
  const p=new URLSearchParams(location.search);
  const site={
    id:p.get('siteId')||'haus',
    name:p.get('siteName')||'Haus',
    type:p.get('siteType')||'wohnheim',
    canton:p.get('canton')||'BS'
  };
  function safeJson(v,fallback){try{return JSON.parse(v||'')}catch(_){return fallback}}
  const units=safeJson(p.get('units'),[]).slice(0,4);
  const auto=Object.assign(site.type==='wohnheim'?{nachtwache:true,pikett:true,hausdienstplan:true}:{nachtwache:false,pikett:false,hausdienstplan:false}, safeJson(p.get('auto'),{}));
  const palettes=[
    {emoji:'🌿',bg:'linear-gradient(135deg,#d8f3dc,#95d5b2)',text:'#1b4332'},
    {emoji:'🌊',bg:'linear-gradient(135deg,#caf0f8,#48cae4)',text:'#023e8a'},
    {emoji:'🌸',bg:'linear-gradient(135deg,#ffe5ec,#ffafcc)',text:'#7a1134'},
    {emoji:'☀️',bg:'linear-gradient(135deg,#fff3b0,#f9c74f)',text:'#7c4a03'}
  ];
  function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
  function slug(s){return String(s||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'bereich'}
  function open(id){parent.postMessage({type:'loadPlanner',id},'*')}
  document.title='ULMIPOINT · '+site.name;
  document.getElementById('siteName').textContent=site.name;
  document.getElementById('siteType').textContent='ULMIPOINT · '+(site.type==='tageszentrum'?'Tageszentrum':'Haus');

  const f=[];
  if(auto.nachtwache) f.push('<button class="fn night" data-id="nachtwache">Nachtwache</button>');
  if(auto.pikett) f.push('<button class="fn pikett" data-id="pikett">Haus-Pikett</button>');
  if(auto.hausdienstplan) f.push('<button class="fn plan" data-id="hausdienstplan">Haus-Dienstplan</button>');
  document.getElementById('functionButtons').innerHTML=f.join('');

  const cards=[];
  units.forEach((u,i)=>{
    const id=slug(u.plannerKey||u.id||u.name);
    const pal=palettes[i%palettes.length];
    cards.push('<button class="room" data-id="'+esc(id)+'" style="background:'+pal.bg+';color:'+pal.text+'"><span class="emoji">'+pal.emoji+'</span><strong>'+esc(u.name||('Gruppe '+(i+1)))+'</strong><small>'+esc(u.type||'Gruppe')+'</small></button>');
  });
  for(let i=units.length;i<4;i++){
    cards.push('<div class="room empty"><span class="emoji">➕</span><strong>Raum frei</strong><small>in Organisation erfassen</small></div>');
  }
  document.getElementById('rooms').innerHTML=cards.join('');
  document.querySelectorAll('[data-id]').forEach(btn=>btn.onclick=()=>open(btn.dataset.id));
})();
</script>
</body>
</html>
