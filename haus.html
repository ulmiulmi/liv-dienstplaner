<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ULMIPOINT Haus</title>
<style>
:root{
  --text:#172033;
  --muted:#667085;
  --line:#d9e2ef;
  --blue:#2563eb;
  --green:#0f8a5f;
  --brown:#7c2d12;
  --shadow:0 12px 30px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#edf5ff,#fbfcff 55%,#f6f8fc);
  font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--text);
  padding:14px;
}
.page{
  max-width:1160px;
  margin:0 auto;
}
.hero,.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:26px;
  box-shadow:var(--shadow);
}
.hero{
  padding:18px;
  margin-bottom:12px;
}
.eyebrow{
  font-size:12px;
  font-weight:950;
  color:var(--blue);
  letter-spacing:.06em;
  text-transform:uppercase;
}
h1{
  margin:4px 0 0;
  font-size:clamp(44px,7vw,84px);
  line-height:.9;
  letter-spacing:-.08em;
}
.section{
  margin-top:12px;
}
.section-title{
  font-size:18px;
  font-weight:950;
  letter-spacing:-.04em;
  margin:0 0 8px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
}
.functions{
  grid-template-columns:repeat(3,minmax(0,1fr));
}
.tile{
  min-height:132px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:24px;
  padding:16px;
  box-shadow:var(--shadow);
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  text-align:left;
  cursor:pointer;
  font:inherit;
  color:var(--text);
  position:relative;
  overflow:hidden;
}
.tile:hover{
  transform:translateY(-1px);
  box-shadow:0 16px 36px rgba(16,24,40,.12);
}
.tile strong{
  font-size:clamp(24px,3.2vw,42px);
  line-height:.95;
  letter-spacing:-.06em;
  position:relative;
  z-index:1;
}
.tile .icon{
  position:absolute;
  top:14px;
  right:16px;
  font-size:32px;
  opacity:.9;
}
.tile.group{
  background:linear-gradient(135deg,#f7fbff,#eaf2ff);
  color:#12336b;
}
.tile.group:nth-child(2){
  background:linear-gradient(135deg,#f2fbf6,#dff7ea);
  color:#12452f;
}
.tile.group:nth-child(3){
  background:linear-gradient(135deg,#fff7ed,#ffedd5);
  color:#7c2d12;
}
.tile.group:nth-child(4){
  background:linear-gradient(135deg,#fdf2f8,#fce7f3);
  color:#831843;
}
.tile.empty{
  background:linear-gradient(135deg,#f8fafc,#eef2f7);
  color:#667085;
  cursor:default;
}
.tile.empty:hover{
  transform:none;
}
.tile.night{
  background:linear-gradient(135deg,#111827,#1e3a8a);
  color:#fff;
}
.tile.pikett{
  background:linear-gradient(135deg,#fff7ed,#fed7aa);
  color:#7c2d12;
}
.tile.plan{
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  color:#1d4ed8;
}
.empty-state{
  border:1px dashed #c9dcff;
  background:#f7fbff;
  color:#175cd3;
  border-radius:24px;
  padding:22px;
  font-weight:950;
}
@media(max-width:900px){
  .grid,.functions{grid-template-columns:1fr 1fr}
}
@media(max-width:620px){
  body{padding:10px}
  .hero{border-radius:0 0 24px 24px;margin:-10px -10px 12px}
  .grid,.functions{grid-template-columns:1fr}
  .tile{min-height:104px}
}
</style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div class="eyebrow" id="siteType">ULMIPOINT · Haus</div>
    <h1 id="siteName">Haus</h1>
  </section>

  <section class="section" id="functionSection">
    <h2 class="section-title">Hausfunktionen</h2>
    <div class="grid functions" id="functionButtons"></div>
  </section>

  <section class="section">
    <h2 class="section-title">Gruppen</h2>
    <div class="grid" id="rooms"></div>
  </section>
</div>

<script>
(function(){
  const p = new URLSearchParams(location.search);

  function param(name, fallback=''){
    return p.get(name) || fallback;
  }
  function safeJson(value, fallback){
    try { return JSON.parse(value || ''); } catch(_) { return fallback; }
  }
  function slug(value){
    return String(value || '')
      .toLowerCase()
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]+/g,'_')
      .replace(/^_+|_+$/g,'') || 'bereich';
  }
  function esc(value){
    return String(value ?? '').replace(/[&<>"']/g, m => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[m]));
  }
  function openPlanner(id){
    parent.postMessage({type:'loadPlanner',id},'*');
  }

  const site = {
    id: param('siteId','haus'),
    name: param('siteName','Haus'),
    type: param('siteType','wohnheim'),
    canton: param('canton','BS')
  };

  const units = safeJson(p.get('units'), []).slice(0,4);
  const defaultAuto = site.type === 'wohnheim'
    ? {nachtwache:true,pikett:true,hausdienstplan:true}
    : {nachtwache:false,pikett:false,hausdienstplan:false};
  const auto = Object.assign(defaultAuto, safeJson(p.get('auto'), {}));

  document.title = 'ULMIPOINT · ' + site.name;
  document.getElementById('siteName').textContent = site.name;
  document.getElementById('siteType').textContent = 'ULMIPOINT · ' + (site.type === 'tageszentrum' ? 'Tageszentrum' : 'Haus');

  const functions = [];
  if(auto.nachtwache) functions.push({id:'nachtwache', label:'Nachtwache', cls:'night', icon:'🌙'});
  if(auto.pikett) functions.push({id:'pikett', label:'Haus-Pikett', cls:'pikett', icon:'🏠'});
  if(auto.hausdienstplan) functions.push({id:'hausdienstplan', label:'Haus-Dienstplan', cls:'plan', icon:'📅'});

  const functionSection = document.getElementById('functionSection');
  const functionButtons = document.getElementById('functionButtons');

  if(!functions.length){
    functionSection.style.display = 'none';
  } else {
    functionButtons.innerHTML = functions.map(fn =>
      '<button class="tile '+fn.cls+'" data-id="'+esc(fn.id)+'"><span class="icon">'+fn.icon+'</span><strong>'+esc(fn.label)+'</strong></button>'
    ).join('');
  }

  const cards = [];
  units.forEach((unit, index) => {
    const id = slug(unit.plannerKey || unit.id || unit.name || ('gruppe_'+(index+1)));
    const name = unit.name || ('Gruppe ' + (index+1));
    cards.push(
      '<button class="tile group" data-id="'+esc(id)+'"><span class="icon">🏡</span><strong>'+esc(name)+'</strong></button>'
    );
  });

  for(let i = units.length; i < 4; i++){
    cards.push('<div class="tile empty"><span class="icon">＋</span><strong>Raum frei</strong></div>');
  }

  document.getElementById('rooms').innerHTML = cards.join('');

  document.querySelectorAll('[data-id]').forEach(btn => {
    btn.addEventListener('click', () => openPlanner(btn.dataset.id));
  });
})();
</script>
</body>
</html>
