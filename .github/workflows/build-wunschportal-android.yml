name: Build Wunschportal Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-wunschportal/**'
      - '.github/workflows/build-wunschportal-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: android-wunschportal
        run: gradle :app:assembleDebug --no-daemon

      - name: Build release AAB
        working-directory: android-wunschportal
        run: gradle :app:bundleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ULMIPOINT-Wunschportal-Debug-APK
          path: android-wunschportal/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: ULMIPOINT-Wunschportal-Release-AAB
          path: android-wunschportal/app/build/outputs/bundle/release/app-release.aab
