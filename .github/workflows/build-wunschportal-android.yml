name: Build Wunschportal Android

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build APK and AAB
        working-directory: android-wunschportal
        run: |
          gradle :app:assembleDebug --no-daemon
          gradle :app:bundleRelease --no-daemon

      - name: Prepare files
        run: |
          mkdir -p release-files
          cp android-wunschportal/app/build/outputs/apk/debug/app-debug.apk release-files/ulmipoint-wunschportal.apk
          cp android-wunschportal/app/build/outputs/bundle/release/app-release.aab release-files/ulmipoint-wunschportal.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ULMIPOINT-Wunschportal-Android
          path: release-files/*

      - name: Publish release download
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wunschportal-android-latest
          name: ULMIPOINT Wunschportal Android
          files: release-files/*
          make_latest: true
